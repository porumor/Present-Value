<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบค้นหาค่า Present Value Quick Look (Direct Tap)</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 900px; /* ขยายกว้างเพื่อให้จัดแนวนอนบนจอใหญ่ได้ */
            text-align: center;
        }

        h1 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #0f172a;
        }

        /* ปุ่มเลือกตาราง */
        .table-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .toggle-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e2e8f0;
            background-color: #fff;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
        }

        .toggle-btn.active {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* จัดกลุ่มแนวนอนสำหรับจอใหญ่ (แท็บเล็ต) */
        .main-layout {
            display: flex;
            flex-direction: column; /* บนมือถือแนวตั้งดิ่งเหมือนเดิม */
            gap: 20px;
        }

        .panel-left {
            flex: 1.2;
        }

        .panel-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* หัวข้อกลุ่มปุ่ม */
        .section-title {
            font-size: 0.9rem;
            font-weight: 600;
            text-align: left;
            margin: 15px 0 8px 0;
            color: #64748b;
        }

        /* Grid ของแผงปุ่ม */
        .grid-pad {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }

        .pad-btn {
            padding: 12px 0;
            border: 1px solid #cbd5e1;
            background-color: #fff;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.15s;
            color: #334155;
        }

        .pad-btn:active {
            transform: scale(0.95);
        }

        /* สีปุ่มเมื่อถูกเลือก */
        .pad-btn.selected-year {
            background-color: #10b981;
            color: white;
            border-color: #10b981;
        }

        .pad-btn.selected-rate {
            background-color: #f59e0b;
            color: white;
            border-color: #f59e0b;
        }

        /* ส่วนแสดงผลตัวเลขขนาดใหญ่ */
        .result-box {
            background-color: #0f172a;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06);
        }

        .result-label {
            font-size: 0.8rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 5px;
        }

        .result-value {
            font-size: 3.8rem;
            font-weight: 800;
            color: #38bdf8;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }

        .current-selection {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-top: 8px;
            font-weight: 500;
        }

        /* ส่วนแสดงลิขสิทธิ์ท้ายการ์ด */
        .copyright-box {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid #e2e8f0;
            font-size: 0.8rem;
            color: #94a3b8;
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        /* สลับเป็นแนวนอน ซ้าย-ขวา เมื่อเปิดบน แท็บเล็ต/หน้าจอกว้าง */
        @media screen and (min-width: 700px) {
            .main-layout {
                flex-direction: row;
                align-items: stretch;
            }
            .result-box {
                margin-top: 30px;
                height: calc(100% - 30px);
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>ค้นหาค่า Present Value (PV)</h1>
    
    <div class="table-toggle">
        <button class="toggle-btn active" onclick="switchTable('A')" id="btn-tableA">
            TABLE A (PVIF)
        </button>
        <button class="toggle-btn" onclick="switchTable('B')" id="btn-tableB">
            TABLE B (PVIFA)
        </button>
    </div>

    <div class="main-layout">
        
        <div class="panel-left">
            <div class="section-title">เลือกปี (Year)</div>
            <div class="grid-pad" id="year-pad"></div>

            <div class="section-title">เลือกเปอร์เซ็นต์ (%)</div>
            <div class="grid-pad" id="rate-pad"></div>
        </div>

        <div class="panel-right">
            <div class="result-box">
                <div class="result-label" id="result-title">TABLE A (PVIF)</div>
                <div class="result-value" id="result-display">-</div>
                <div class="current-selection" id="selection-display">ปี: 1 | ดอกเบี้ย: 1%</div>
            </div>
        </div>

    </div>

    <div class="copyright-box">
        &copy; 2026 PORUMORS.CEOZONE. All Rights Reserved.
    </div>
</div>

    let currentTable = 'A';
    let selectedYear = 1;
    let selectedRate = '1%';

    function init() {
        const yearPad = document.getElementById('year-pad');
        const ratePad = document.getElementById('rate-pad');

        // สร้างปุ่มปี 1-15 (แผงกด)
        for (let i = 1; i <= 15; i++) {
            let btn = document.createElement('button');
            btn.className = `pad-btn ${i === 1 ? 'selected-year' : ''}`;
            btn.id = `btn-y-${i}`;
            btn.innerHTML = i;
            btn.onclick = () => selectYear(i);
            yearPad.appendChild(btn);
        }

        // สร้างปุ่มเปอร์เซ็นต์ 1-15 (แผงกด)
        for (let i = 1; i <= 15; i++) {
            let btn = document.createElement('button');
            btn.className = `pad-btn ${i === 1 ? 'selected-rate' : ''}`;
            btn.id = `btn-r-${i}`;
            btn.innerHTML = `${i}%`;
            btn.onclick = () => selectRate(`${i}%`);
            ratePad.appendChild(btn);
        }

        calculate();
    }

    function selectYear(year) {
        document.getElementById(`btn-y-${selectedYear}`).classList.remove('selected-year');
        selectedYear = year;
        document.getElementById(`btn-y-${selectedYear}`).classList.add('selected-year');
        calculate();
    }

    function selectRate(rate) {
        const oldRateNum = selectedRate.replace('%', '');
        document.getElementById(`btn-r-${oldRateNum}`).classList.remove('selected-rate');
        selectedRate = rate;
        const newRateNum = selectedRate.replace('%', '');
        document.getElementById(`btn-r-${newRateNum}`).classList.add('selected-rate');
        calculate();
    }

    function switchTable(tableType) {
        currentTable = tableType;
        document.getElementById('btn-tableA').classList.toggle('active', tableType === 'A');
        document.getElementById('btn-tableB').classList.toggle('active', tableType === 'B');
        document.getElementById('result-title').innerHTML = `TABLE ${tableType} (${tableType === 'A' ? 'PVIF' : 'PVIFA'})`;
        calculate();
    }

    function calculate() {
        const display = document.getElementById('result-display');
        const selectionDisplay = document.getElementById('selection-display');
        const dataSrc = currentTable === 'A' ? tableA : tableB;
        
        if (dataSrc[selectedYear] && dataSrc[selectedYear][selectedRate]) {
            display.innerHTML = dataSrc[selectedYear][selectedRate];
        } else {
            display.innerHTML = "-";
        }

        selectionDisplay.innerHTML = `ปีที่เลือก: ${selectedYear} | เปอร์เซ็นต์: ${selectedRate}`;
    }

    window.onload = init;

</html>
