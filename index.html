<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบค้นหาค่า Present Value Quick Look (Horizontal Tablet)</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #0f172a; 
            --card-bg: #1e293b; 
            --text-main: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 950px; /* ขยายกว้างขึ้นเพื่อให้แนวนอนดูโปร่งสบาย */
            box-sizing: border-box;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 20px;
            color: #ffffff;
            font-weight: 700;
        }

        /* ปุ่มเลือกตาราง */
        .table-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .toggle-btn {
            flex: 1;
            padding: 14px;
            border: 2px solid #475569;
            background-color: #334155;
            color: #cbd5e1;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .toggle-btn.active {
            background-color: var(--primary);
            color: white;
            border-color: #60a5fa;
            box-shadow: 0 0 10px rgba(37, 99, 235, 0.5);
        }

        /* 👑 ปรับโครงสร้างหลักเป็น Flexbox เพื่อการันตีการจัดแนวนอน 👑 */
        .main-layout {
            display: flex;
            flex-direction: column; /* มาตรฐานบนมือถือให้เป็นแนวตั้ง */
            gap: 25px;
            width: 100%;
        }

        /* กล่องแสดงผลลัพธ์ */
        .result-box {
            flex: 1;
            background-color: #000000;
            border: 3px solid #10b981;
            border-radius: 18px;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.25);
            box-sizing: border-box;
        }

        .result-label {
            font-size: 0.9rem;
            color: #10b981;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .result-value {
            font-size: 4.5rem; 
            font-weight: 900;
            color: #10b981;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 15px rgba(16, 185, 129, 0.6);
            letter-spacing: 0.02em;
            line-height: 1;
            margin: 15px 0;
        }

        .current-selection {
            font-size: 1rem;
            color: #ffffff;
            background-color: #334155;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 600;
        }

        /* แผงควบคุมปุ่มกด */
        .controls-panel {
            flex: 1.3; /* ให้พื้นที่แผงปุ่มกว้างกว่ากล่องผลลัพธ์เล็กน้อยในแนวนอน */
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-sizing: border-box;
        }

        .section-title {
            font-size: 1rem;
            font-weight: 700;
            text-align: left;
            margin: 5px 0 8px 5px;
            color: #e2e8f0;
        }

        /* Grid ปุ่มกด */
        .grid-pad {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        .pad-btn {
            padding: 15px 0; 
            border: 1px solid #475569;
            background-color: #334155;
            color: #f8fafc;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.15rem;
            cursor: pointer;
            transition: all 0.1s;
        }

        .pad-btn:active {
            transform: scale(0.92);
        }

        .pad-btn.selected-year {
            background-color: #059669;
            color: #ffffff;
            border-color: #34d399;
            box-shadow: 0 0 8px rgba(52, 211, 153, 0.4);
        }

        .pad-btn.selected-rate {
            background-color: #d97706;
            color: #ffffff;
            border-color: #fbbf24;
            box-shadow: 0 0 8px rgba(251, 191, 36, 0.4);
        }

        /* 💻 บังคับเปลี่ยนเป็น "แนวนอนซ้าย-ขวา" ทันทีเมื่อหน้าจอกว้างเกิน 700px (ขนาดแท็บเล็ต) 💻 */
        @media screen and (min-width: 700px) {
            .main-layout {
                flex-direction: row; /* เปลี่ยนทิศทางเป็นแนวนอนซ้ายขวา */
                align-items: stretch; /* ให้กล่องซ้ายและขวาสูงเท่ากันดูสวยงาม */
            }
            .result-box {
                padding: 40px 20px;
            }
            .result-value {
                font-size: 5.5rem; /* บนแท็บเล็ตแนวนอน ตัวเลขจะใหญ่สะใจมาก */
            }
        }
    </style>
</head>

    <h1>ระบบค้นหาค่า Present Value (PV)</h1>
    
    <div class="table-toggle">
        <button class="toggle-btn active" onclick="switchTable('A')" id="btn-tableA">
            TABLE A (PVIF)
        </button>
        <button class="toggle-btn" onclick="switchTable('B')" id="btn-tableB">
            TABLE B (PVIFA)

    </div>

    <div class="main-layout">
        
        <div class="result-box">
            <div class="result-label" id="result-title">TABLE A (PVIF)</div>
            <div class="result-value" id="result-display">0.99010</div>
            <div class="current-selection" id="selection-display">ปี: 1 | อัตรา: 1%</div>
        </div>

        <div class="controls-panel">
            <div class="section-title">เลือกปี (Year)</div>
            <div class="grid-pad" id="year-pad"></div>

            <div class="section-title">เลือกเปอร์เซ็นต์ (%)</div>
            <div class="grid-pad" id="rate-pad"></div>
        </div>

    </div>
</div>

    let currentTable = 'A', selectedYear = 1, selectedRate = '1%';

    function init() {
        const yearPad = document.getElementById('year-pad');
        const ratePad = document.getElementById('rate-pad');

        for (let i = 1; i <= 15; i++) {
            let btn = document.createElement('button');
            btn.className = `pad-btn ${i === 1 ? 'selected-year' : ''}`;
            btn.id = `btn-y-${i}`;
            btn.innerHTML = i;
            btn.onclick = () => selectYear(i);
            yearPad.appendChild(btn);
        }

        for (let i = 1; i <= 15; i++) {
            let btn = document.createElement('button');
            btn.className = `pad-btn ${i === 1 ? 'selected-rate' : ''}`;
            btn.id = `btn-r-${i}`;
            btn.innerHTML = `${i}%`;
            btn.onclick = () => selectRate(`${i}%`);
            ratePad.appendChild(btn);
        }
        calculate();
    }

    function selectYear(year) {
        document.getElementById(`btn-y-${selectedYear}`).classList.remove('selected-year');
        selectedYear = year;
        document.getElementById(`btn-y-${selectedYear}`).classList.add('selected-year');
        calculate();
    }

    function selectRate(rate) {
        const oldRateNum = selectedRate.replace('%', '');
        document.getElementById(`btn-r-${oldRateNum}`).classList.remove('selected-rate');
        selectedRate = rate;
        const newRateNum = selectedRate.replace('%', '');
        document.getElementById(`btn-r-${newRateNum}`).classList.add('selected-rate');
        calculate();
    }

    function switchTable(tableType) {
        currentTable = tableType;
        document.getElementById('btn-tableA').classList.toggle('active', tableType === 'A');
        document.getElementById('btn-tableB').classList.toggle('active', tableType === 'B');
        document.getElementById('result-title').innerHTML = `TABLE ${tableType} (${tableType === 'A' ? 'PVIF' : 'PVIFA'})`;
        calculate();
    }

    function calculate() {
        const display = document.getElementById('result-display');
        const selectionDisplay = document.getElementById('selection-display');
        const dataSrc = currentTable === 'A' ? tableA : tableB;
        
        if (dataSrc[selectedYear] && dataSrc[selectedYear][selectedRate]) {
            display.innerHTML = dataSrc[selectedYear][selectedRate];
        } else {
            display.innerHTML = "-";
        }
        selectionDisplay.innerHTML = `ปีที่เลือก: ${selectedYear} | เปอร์เซ็นต์: ${selectedRate}`;
    }

    window.onload = init;
